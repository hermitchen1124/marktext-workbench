name: Build Windows Artifacts

on:
  workflow_dispatch:

jobs:
  build-win-x64:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 16
        cache: yarn

    # Workaround from upstream MarkText workflow for native module builds on newer runners.
    - name: Fix node-gyp
      run: |
        npm install --global node-gyp@latest
        npm prefix -g | % { npm config set node_gyp "$_\node_modules\node-gyp\bin\node-gyp.js" }
        node-gyp install
      shell: pwsh

    - name: Install dependencies
      run: yarn install --check-files --frozen-lockfile --network-timeout 600000

    - name: Build windows packages
      env:
        CSC_IDENTITY_AUTO_DISCOVERY: "false"
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npx electron-builder --win nsis zip --x64 --publish never

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: marktext-workbench-win-x64
        path: |
          build/marktext-workbench-setup.exe
          build/marktext-workbench-x64-win.zip
          build/marktext-workbench-x64-win.zip.blockmap
